apiVersion: v1
kind: Secret
metadata:
  name: cva-enduro-secret
type: Opaque
stringData:
  cva-enduro.toml: |
    debug = true
    verbosity = 2

    [ingestBucket]
    endpoint = "http://minio.enduro-sdps:9000"
    pathStyle = true
    accessKey = "minio"
    secretKey = "minio123"
    region = "us-west-1"
    bucket = "enduro-ingest"

    [temporal]
    address = "temporal-frontend.enduro-sdps:7233"
    namespace = "default"
   
    [worker]
    maxConcurrentSessions = 1
    taskQueue = "cva-enduro"
    
    [preprocessing]
    workflowName = "preprocessing"
    sharedPath = "/home/enduro/shared"

    [postbatch]
    workflowName = "postbatch"
